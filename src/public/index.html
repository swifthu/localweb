<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>localweb</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("localweb-theme");
          if (stored === "light" || stored === "dark") {
            document.documentElement.dataset.theme = stored;
            return;
          }
        } catch (_) {}
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
          document.documentElement.dataset.theme = "light";
        } else {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/theme.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>localweb</h1>
        <span class="subtitle">local dev services</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme">☾</button>
    </header>
    <main>
      <section id="dashboard-section">
        <div id="dashboard-grid"><!-- dashboard.js renders here --></div>
      </section>
      <section id="services-section">
        <div class="section-bar">
          <h2>Services</h2>
          <div class="section-bar-right">
            <input id="search-input" type="search" placeholder="Search…" />
            <div id="filter-bar">
              <label><input type="checkbox" id="filter-tcp" checked /> TCP</label>
              <label><input type="checkbox" id="filter-udp" /> UDP</label>
            </div>
            <button id="refresh-btn">Refresh</button>
          </div>
        </div>
        <ul id="services-list"></ul>
        <p id="empty-state" class="hidden">No LISTEN ports detected.</p>
      </section>
      <section id="preshared-section">
        <div class="section-bar">
          <h2>Pre-shared services</h2>
        </div>
        <ul id="preshared-list"></ul>
        <p id="preshared-empty" class="hidden">No pre-shared services configured.</p>
      </section>
    </main>
    <div id="banner" class="banner hidden"></div>
    <dialog id="confirm-dialog">
      <form method="dialog">
        <h3 id="confirm-title">Confirm</h3>
        <p id="confirm-body"></p>
        <menu>
          <button value="cancel">Cancel</button>
          <button id="confirm-ok" value="ok">OK</button>
        </menu>
      </form>
    </dialog>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
